repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - typer
          - pydantic
          - pydantic-settings
          - anthropic
          - types-PyYAML
          - fastapi
          - sqlalchemy[mypy]
          - bcrypt
          - authlib
        args: [--strict]
        pass_filenames: false
        entry: mypy src/
